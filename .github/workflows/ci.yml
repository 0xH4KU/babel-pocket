name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Audit
        run: npm audit --audit-level=high

      - name: Type Check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test with Coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Smoke Built Artifact
        run: |
          test -f dist/src/index.js
          test -f dist/src/public/index.html
          node --input-type=module -e "const v = await import('./dist/src/shared/version.js'); if (v.APP_VERSION !== '0.1.0') process.exit(1);"

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t babel:ci .
