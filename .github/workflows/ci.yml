name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Audit
        run: npm audit --audit-level=high

      - name: Type Check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test with Coverage
        run: npm run test:coverage

      - name: Build Dashboard Demo
        run: npm run demo:build

      - name: Build
        run: npm run build

      - name: Smoke Built Artifact
        run: |
          test -f dist/src/index.js
          test -f dist/src/public/index.html
          node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';

          const { version } = JSON.parse(readFileSync('package.json', 'utf8'));
          const { APP_VERSION } = await import('./dist/src/shared/version.js');

          if (APP_VERSION !== version) {
            console.error(`Expected APP_VERSION ${version}, got ${APP_VERSION}`);
            process.exit(1);
          }
          NODE

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t babel:ci .
